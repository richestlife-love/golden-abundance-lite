name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on PRs; let main-branch runs finish (they produce
# the deploy signal + branch-protection status we care about).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          python-version: "3.14"

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Typecheck
        run: uv run ty check

      - name: Validate contract fixtures
        run: uv run python -m backend.contract.validate_examples

      - name: Test
        # pyproject.toml's addopts already sets `-v --cov` and the coverage
        # report gate (`fail_under = 90`); no flag overrides needed here.
        run: uv run pytest

      - name: Check frontend/openapi.json snapshot is up to date
        # Regenerates the snapshot into the working tree and fails if the
        # committed copy has drifted from what the backend now produces.
        # Format must match `just gen-types` (indent=2) so the diff is clean.
        env:
          APP_ENV: test
        run: |
          uv run python -c 'import json; from backend.server import app; print(json.dumps(app.openapi(), indent=2))' > ../frontend/openapi.json
          if ! git diff --exit-code ../frontend/openapi.json; then
            echo "::error::frontend/openapi.json is stale. Run 'just gen-types' locally and commit the result."
            exit 1
          fi

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          python-version: "3.14"
          # Backend job owns the uv cache save; frontend only restores to
          # avoid the two jobs racing on an identical key.
          save-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # `frontend/src/api/schema.d.ts` is gitignored and regenerated from the
      # backend's OpenAPI. tsc --noEmit imports from it transitively, so it
      # MUST exist before the typecheck step.
      - name: Sync backend deps (for OpenAPI generator)
        working-directory: backend
        run: uv sync --all-extras --dev

      - name: Generate frontend OpenAPI types
        # Pins the prod-env guard in backend/src/backend/config.py off — importing
        # backend.server runs create_app() at module scope, which calls
        # get_settings(); APP_ENV=prod without SUPABASE_URL would raise.
        env:
          APP_ENV: test
        run: |
          uv run --project backend python -c 'import json; from backend.server import app; print(json.dumps(app.openapi()))' > /tmp/ga-openapi.json
          pnpm dlx openapi-typescript /tmp/ga-openapi.json -o frontend/src/api/schema.d.ts

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build
